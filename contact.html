<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Research Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1 class="logo">Contact</h1>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <form id="contactForm" style="max-width: 500px; margin: 40px auto; display: flex; flex-direction: column; gap: 15px;">
            <input type="text" placeholder="Your Name" required style="padding: 10px;">
            <input type="email" placeholder="Your Email" required style="padding: 10px;">
            <textarea placeholder="Your Message" rows="5" style="padding: 10px;"></textarea>
            <button type="submit" style="padding: 10px; background: #1a5f7a; color: white; border: none; cursor: pointer;">Send Message</button>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
